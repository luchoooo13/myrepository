<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CLIENTE · Pantalla de Alertas</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="client">
    <div class="client__idle" id="idle">
      <div class="clock clock--big">
        <div class="clock__time" data-clock-time>--:--:--</div>
        <div class="clock__date" data-clock-date>—</div>
      </div>
      <h1>Pantalla de Alertas</h1>
      <p class="client__status" id="status">Conectando…</p>
      <button class="btn btn--enable" id="enableBtn">
        Activar sonido y voz
      </button>
      <p class="client__hint">
        Tocá el botón una vez para que el navegador permita reproducir audio y
        voz automáticamente cuando llegue una alerta.
      </p>
    </div>

    <div class="client__alert" id="alertOverlay" hidden>
      <div class="client__alert-strobe" aria-hidden="true"></div>
      <button
        class="client__alert-close"
        id="alertCloseBtn"
        type="button"
        aria-label="Cerrar alerta en este dispositivo"
        title="Cerrar alerta en este dispositivo"
      >
        <span aria-hidden="true">×</span>
      </button>
      <div class="clock clock--overlay">
        <div class="clock__time" data-clock-time>--:--:--</div>
      </div>
      <div class="client__alert-inner">
        <div class="client__alert-tag">ALERTA</div>
        <div class="client__alert-type" id="alertType">—</div>
        <div class="client__alert-time" id="alertTime">1:30</div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/clock.js"></script>
    <script src="/client.js"></script>
  </body>
</html>
